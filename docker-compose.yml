version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: odoo_postgres
    environment:
      POSTGRES_DB: odoo_db
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - PORT=5432
      - USER=odoo
      - PASSWORD=odoo
      - DB_NAME=odoo_db
    volumes:
      - ./odoo-xml-editor:/home/odoo/extra-addons/odoo-xml-editor
      - odoo_data:/home/odoo/odoo
    ports:
      - "8069:8069"
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
